<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミニミニFC蒲郡店お部屋ガチャ</title>
    <style>
        /* 見た目を整える設定 */
        body { font-family: "Helvetica Neue", Arial, sans-serif; text-align: center; background-color: #f5f6fa; color: #2f3640; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #e84118; font-size: 1.5rem; margin-bottom: 20px; }
        button { background: #e84118; color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background: #c23616; transform: translateY(-2px); }
        button:disabled { background: #dcdde1; cursor: not-allowed; }
        .result { display: none; margin-top: 30px; text-align: left; border-top: 2px dashed #dcdde1; padding-top: 20px; }
        .result img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #dcdde1; }
        .room-name { font-size: 1.3rem; font-weight: bold; margin: 0 0 10px 0; color: #2f3640; }
        .price { color: #e84118; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .comment-box { background: #f1f2f6; padding: 15px; border-radius: 10px; font-size: 0.95rem; line-height: 1.6; position: relative; margin-bottom: 15px; }
        .comment-box::before { content: "スタッフの推しポイント："; display: block; font-weight: bold; color: #718093; font-size: 0.8rem; margin-bottom: 5px; }
        .link-btn { display: block; text-align: center; background: #0097e6; color: white; text-decoration: none; padding: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏠 運命のお部屋診断ガチャ</h1>
    <p>蒲郡・幸田での新しい暮らし<br>お部屋ガチャで占ってみませんか？</p>
    
    <!-- 1. ガチャを回すボタン -->
    <button id="gacha-btn" onclick="spinGacha()">ガチャを回す！</button>

    <!-- 2. 結果が表示されるエリア -->
    <div id="result-card" class="result">
        <img id="room-img" src="" alt="物件画像">
        <h2 id="room-name" class="room-name">物件名</h2>
        <div id="room-price" class="price">家賃：--</div>
        <!-- ↓ここから追加↓ -->
<div style="font-size: 1rem; color: #4b4b4b; margin-bottom: 10px; font-weight: bold;">
    📍 <span id="room-address">場所</span> <br>
    🏠 間取り：<span id="room-layout">--</span>
</div>
<!-- ↑ここまで追加↑ -->
        <div class="comment-box">
            <span id="room-comment">コメントがここに入ります。</span>
        </div>
        <a id="room-link" class="link-btn" href="#" target="_blank">この物件を詳しく見る →</a>
    </div>
</div>

<script>
    // 【重要】ここにGASで発行されたURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6Ui3LYGG7q9w0T_PS2m5lIlht9uXXWT-bhcn4Fv0JyB6fwcUcvCQndAyyFXc_-HDNYw/exec";

    async function spinGacha() {
        const btn = document.getElementById('gacha-btn');
        const card = document.getElementById('result-card');
        
        // 演出：ボタンを無効化し、カードを隠す
        btn.disabled = true;
        btn.innerText = "運命の物件を探しています...";
        card.style.display = "none";

        try {
            // GASからデータを取得
            const response = await fetch(GAS_URL);
            if (!response.ok) throw new Error('データが取れませんでした');
            const rooms = await response.json();

            // ランダムに1件選ぶ
            const room = rooms[Math.floor(Math.random() * rooms.length)];

            // 画面にデータをセット
            document.getElementById('room-img').src = room.img;
            document.getElementById('room-name').innerText = room.name;
            document.getElementById('room-price').innerText = "家賃：" + room.price;
            // ↓ここから2行追加↓
document.getElementById('room-address').innerText = room.address;
document.getElementById('room-layout').innerText = room.layout;
// ↑ここまで追加↑
            document.getElementById('room-comment').innerText = room.comment;
            document.getElementById('room-link').href = room.url;

            // 0.8秒待ってから表示（演出用）
            setTimeout(() => {
                card.style.display = "block";
                btn.disabled = false;
                btn.innerText = "もう一度回す！";
            }, 800);

        } catch (error) {
            console.error(error);
            alert("エラーが発生しました。GASのURLが正しいか、デプロイ設定が「全員」になっているか確認してください。");
            btn.disabled = false;
            btn.innerText = "やり直す";
        }
    }
</script>

</body>
</html>
